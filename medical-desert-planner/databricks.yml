bundle:
  name: medical-desert-planner

variables:
  sql_warehouse_id:
    description: SQL Warehouse ID
  postgres_branch:
    description: Full Lakebase Postgres branch resource name. Obtain by running `databricks postgres list-branches {project-name}`, select the desired item from the output array and use its .name value. Requires the project resource name.
  postgres_database:
    description: Full Lakebase Postgres database resource name. Obtain by running `databricks postgres list-databases {branch-name}`, select the desired item from the output array and use its .name value. Requires the branch resource name.
  postgres_project:
    description: Full Lakebase Postgres project resource name. Obtain by running `databricks postgres list-projects`, select the desired item from the output array and use its .name value.
  genie_space_id:
    description: Genie Space ID powering the in-app "Ask Genie" chatbot. Obtain from the About tab of the Genie space, or run `databricks genie list-spaces`.

resources:
  apps:
    app:
      name: "medical-desert-planner"
      description: "A Databricks App powered by AppKit"
      source_code_path: ./
      # On-behalf-of-user API scopes. dashboards.genie lets the app run the
      # "Ask Genie" chatbot as the signed-in user.
      user_api_scopes:
        - dashboards.genie

      # The resources which this app has access to.
      resources:
        - name: sql-warehouse
          sql_warehouse:
            id: ${var.sql_warehouse_id}
            permission: CAN_USE
        - name: postgres
          postgres:
            branch: ${var.postgres_branch}
            database: ${var.postgres_database}
            permission: CAN_CONNECT_AND_CREATE
        - name: genie-space
          genie_space:
            id: ${var.genie_space_id}
            permission: CAN_RUN

targets:
  default:
    default: true
    workspace:
      host: https://dbc-529fbae2-e4dd.cloud.databricks.com

    variables:
      sql_warehouse_id: 157357f8d788b28d
      postgres_branch: projects/medical-desert-planner/branches/production
      postgres_database: projects/medical-desert-planner/branches/production/databases/databricks-postgres
      postgres_project: projects/medical-desert-planner
      genie_space_id: 01f169069ace1baeb6b2372f42aa5538
